# Ports: FRONTEND_HOST_PORT (default 8000) is the only published port.
# API listens on API_PORT (default 8000) inside the compose network as http://api:8000.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: akashicompliance
      POSTGRES_PASSWORD: akashicompliance
      POSTGRES_DB: akashicompliance
    # No host port — avoids conflict with other Postgres on the server.
    # api/worker connect via docker network: postgres:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akashicompliance -d akashicompliance"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No host port — avoids conflict with other Redis on the server.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_ENABLED: "true"
      API_PORT: ${API_PORT:-8000}
      API_BASE_URL: http://api:${API_PORT:-8000}
      DATABASE_URL: postgresql://akashicompliance:akashicompliance@postgres:5432/akashicompliance
      AUTH_ENABLED: "true"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-nurikw3}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Ak4sh1_Nurik_2026!}
    # No host port — API only inside compose; browser reaches it via frontend /backend-api.
    volumes:
      - ./data:/app/data
      - ./generated-pdfs:/app/generated-pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import base64,os,urllib.request; u=os.environ['ADMIN_USERNAME']; p=os.environ['ADMIN_PASSWORD']; port=os.environ.get('API_PORT','8000'); r=urllib.request.Request(f'http://127.0.0.1:{port}/health'); r.add_header('Authorization','Basic '+base64.b64encode(f'{u}:{p}'.encode()).decode()); urllib.request.urlopen(r)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: dockerfile
    command: uv run akashicompliance-worker
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_ENABLED: "true"
      DATABASE_URL: postgresql://akashicompliance:akashicompliance@postgres:5432/akashicompliance
      AUTH_ENABLED: "true"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-nurikw3}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Ak4sh1_Nurik_2026!}
    volumes:
      - ./data:/app/data
      - ./generated-pdfs:/app/generated-pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked at build; must be reachable from frontend container (not host 127.0.0.1).
        NEXT_PUBLIC_API_URL: http://api:${API_PORT:-8000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-8000}:${FRONTEND_CONTAINER_PORT:-3000}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.PORT||'3000')).then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
