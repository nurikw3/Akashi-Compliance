services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: akashicompliance
      POSTGRES_PASSWORD: akashicompliance
      POSTGRES_DB: akashicompliance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akashicompliance -d akashicompliance"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_ENABLED: "true"
      API_BASE_URL: http://api:8000
      DATABASE_URL: postgresql://akashicompliance:akashicompliance@postgres:5432/akashicompliance
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./generated-pdfs:/app/generated-pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: dockerfile
    command: uv run akashicompliance-worker
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_ENABLED: "true"
      DATABASE_URL: postgresql://akashicompliance:akashicompliance@postgres:5432/akashicompliance
    volumes:
      - ./data:/app/data
      - ./generated-pdfs:/app/generated-pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
