# Akashi Compliance — external reverse proxy → app server :8000 (frontend only)
#
# App server: docker compose up -d
#   - frontend published as 0.0.0.0:8000 → container :3000
#   - api/worker/postgres/redis — no public ports
#
# 1. Copy to reverse proxy: /etc/nginx/conf.d/ai.akashi.cloud.conf
# 2. Set proxy_pass to app server IP (e.g. 185.191.212.72:8000)
# 3. From reverse proxy: curl -I http://APP_IP:8000
# 4. nginx -t && systemctl reload nginx
# 5. certbot --nginx -d ai.akashi.cloud

server {
    listen 80;
    server_name ai.akashi.cloud;
    client_max_body_size 64m;

    location / {
        proxy_pass http://185.191.212.72:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# After certbot, HTTPS block is added (same location / → :8000).
# API is not exposed on the host; Next proxies /backend-api to http://api:8000 inside Docker.
