# Akashi Compliance (Next.js UI on :8000)
# Reverse proxy machine → app server (private IP preferred on same VPC)
#
# 1. Copy to reverse proxy:
#    /etc/nginx/conf.d/akashi-dc.kz.conf
# 2. DNS: akashi-dc.kz A → IP of reverse-proxy (not app server)
# 3. App server: docker compose up -d (frontend on 0.0.0.0:8000)
# 4. From reverse proxy test:
#    curl -I http://172.30.10.244:8000
# 5. nginx -t && systemctl reload nginx
# 6. certbot --nginx -d akashi-dc.kz

server {
    listen 80;
    server_name akashi-dc.kz www.akashi-dc.kz;
    client_max_body_size 64m;

    location / {
        proxy_pass http://172.30.10.244:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# After certbot, HTTPS block will be added automatically.
# API is not published on the host — Next.js proxies /backend-api to http://api:8000 in Docker.
